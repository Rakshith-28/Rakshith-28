<svg width="100%" viewBox="0 0 880 160" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Rakshith LK Header</title>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#050510"/>
    <stop offset="100%" stop-color="#080818"/>
  </linearGradient>
  <radialGradient id="g1" cx="25%" cy="60%" r="50%">
    <stop offset="0%" stop-color="#1e3a8a" stop-opacity="0.6"/>
    <stop offset="100%" stop-color="#1e3a8a" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="g2" cx="78%" cy="40%" r="50%">
    <stop offset="0%" stop-color="#2e1065" stop-opacity="0.6"/>
    <stop offset="100%" stop-color="#2e1065" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="g3" cx="50%" cy="100%" r="40%">
    <stop offset="0%" stop-color="#1d4ed8" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="ng" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#818cf8"/>
    <stop offset="45%" stop-color="#ffffff"/>
    <stop offset="100%" stop-color="#60a5fa"/>
  </linearGradient>
  <filter id="nf">
    <feGaussianBlur stdDeviation="2.5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<rect width="880" height="160" fill="url(#bg)"/>
<rect width="880" height="160" fill="url(#g1)"/>
<rect width="880" height="160" fill="url(#g2)"/>
<rect width="880" height="160" fill="url(#g3)"/>

<!-- Particles -->
<circle cx="55" cy="35" r="1.2" fill="#818cf8" opacity="0.6"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="4s" repeatCount="indefinite"/></circle>
<circle cx="820" cy="50" r="1.4" fill="#60a5fa" opacity="0.7"><animate attributeName="opacity" values="0.7;0.15;0.7" dur="5s" repeatCount="indefinite" begin="1s"/></circle>
<circle cx="180" cy="140" r="1.0" fill="#a5b4fc" opacity="0.5"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="3.5s" repeatCount="indefinite" begin="0.5s"/></circle>
<circle cx="700" cy="135" r="1.3" fill="#818cf8" opacity="0.65"><animate attributeName="opacity" values="0.65;0.1;0.65" dur="6s" repeatCount="indefinite" begin="2s"/></circle>
<circle cx="440" cy="18" r="1.5" fill="#60a5fa" opacity="0.8"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="4.5s" repeatCount="indefinite" begin="1.5s"/></circle>
<circle cx="100" cy="110" r="1.1" fill="#818cf8" opacity="0.5"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="7s" repeatCount="indefinite" begin="3s"/></circle>
<circle cx="780" cy="125" r="0.9" fill="#60a5fa" opacity="0.6"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="3.8s" repeatCount="indefinite" begin="1.2s"/></circle>

<!-- Open to Work top right -->
<rect x="748" y="12" width="116" height="22" rx="11" fill="#052e16" stroke="#22c55e" stroke-width="0.8"/>
<circle cx="762" cy="23" r="4" fill="#22c55e" opacity="0.9"><animate attributeName="opacity" values="0.9;0.2;0.9" dur="2s" repeatCount="indefinite"/></circle>
<text x="826" y="27" text-anchor="middle" font-family="'Trebuchet MS',sans-serif" font-size="11" fill="#86efac">Open to Work</text>

<!-- Name -->
<text x="440" y="72" text-anchor="middle" font-family="'Trebuchet MS',sans-serif" font-size="34" font-weight="700" letter-spacing="1" fill="url(#ng)" filter="url(#nf)" opacity="0">
  Hey, I'm Rakshith L K
  <animate attributeName="opacity" values="0;1" dur="0.8s" fill="freeze" begin="0.2s"/>
</text>

<!-- Role -->
<text x="440" y="104" text-anchor="middle" font-family="'Trebuchet MS',sans-serif" font-size="15" letter-spacing="1.5" fill="#94a3b8" opacity="0">
  Full-Stack Developer  ·  CS Undergrad @ NMAM Nitte
  <animate attributeName="opacity" values="0;1" dur="0.8s" fill="freeze" begin="0.8s"/>
</text>

<!-- Divider -->
<line x1="300" y1="116" x2="415" y2="116" stroke="#3730a3" stroke-width="0.6" opacity="0"><animate attributeName="opacity" values="0;0.6" dur="0.4s" fill="freeze" begin="1.2s"/></line>
<circle cx="440" cy="116" r="2" fill="#818cf8"><animate attributeName="opacity" values="0;0.9" dur="0.4s" fill="freeze" begin="1.2s"/></circle>
<line x1="465" y1="116" x2="580" y2="116" stroke="#3730a3" stroke-width="0.6" opacity="0"><animate attributeName="opacity" values="0;0.6" dur="0.4s" fill="freeze" begin="1.2s"/></line>

<line x1="0" y1="159" x2="880" y2="159" stroke="#1e3a8a" stroke-width="1" opacity="0.5"/>
</svg>
